name: PR Build Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_PUBLIC_KEY: ${{ secrets.SUPABASE_PUBLIC_KEY }}

jobs:
  build:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Determine Node.js version
        id: node-version
        run: |
          if [ -f .nvmrc ]; then
            echo "version=$(cat .nvmrc | tr -d ' \n\r')" >> "$GITHUB_OUTPUT"
          elif node -e "process.exitCode = typeof require('./package.json').engines?.node === 'string' ? 0 : 1" 2>/dev/null; then
            echo "version=$(node -e "console.log(require('./package.json').engines.node.replace(/[^0-9.]/g, ''))")" >> "$GITHUB_OUTPUT"
          else
            echo "version=22" >> "$GITHUB_OUTPUT"
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node-version.outputs.version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate ZenStack artifacts
        run: pnpm zen generate

      - name: Build project
        run: pnpm build
